<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PayDZ Checkout</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Arial,sans-serif;
}


body{

    min-height:100vh;

    background:
    radial-gradient(circle at top,#1d4ed8,transparent 35%),
    linear-gradient(135deg,#020617,#0f172a);

    display:flex;
    align-items:center;
    justify-content:center;

    color:white;

}


.container{

    width:430px;

    padding:35px;

    border-radius:30px;

    background:
    rgba(255,255,255,0.08);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.15);

    box-shadow:
    0 30px 80px rgba(0,0,0,.5);

    animation:show .8s ease;

}



@keyframes show{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:none;
}

}



.logo{

text-align:center;
font-size:38px;
font-weight:900;
letter-spacing:-2px;

}


.logo span{

color:#38bdf8;

}



.secure{

margin-top:10px;
text-align:center;

font-size:13px;
color:#94a3b8;

}



.product{

margin-top:35px;

background:
rgba(255,255,255,.08);

padding:20px;

border-radius:20px;

}



.row{

display:flex;

justify-content:space-between;

margin-bottom:15px;

color:#cbd5e1;

}


.price{

font-size:38px;

font-weight:900;

color:white;

}



.currency{

font-size:18px;

color:#38bdf8;

}



.input{

margin-top:20px;

}



input{

width:100%;

padding:15px;

border-radius:15px;

border:none;

outline:none;

background:#020617;

color:white;

border:1px solid #334155;

font-size:15px;

}



.pay{

margin-top:25px;

width:100%;

padding:18px;

border-radius:18px;

border:none;

cursor:pointer;

font-size:18px;

font-weight:bold;

color:white;


background:
linear-gradient(90deg,#2563eb,#06b6d4);


box-shadow:

0 10px 30px rgba(37,99,235,.5);


transition:.3s;


}



.pay:hover{

transform:translateY(-3px);

box-shadow:

0 20px 40px rgba(37,99,235,.7);

}



.methods{

margin-top:25px;

display:flex;

justify-content:center;

gap:10px;

}


.badge{

padding:8px 14px;

border-radius:20px;

background:#1e293b;

font-size:12px;

color:#94a3b8;

}



.footer{

margin-top:30px;

text-align:center;

font-size:12px;

color:#64748b;

}



</style>

</head>


<body>



<div class="container">


<div class="logo">

Pay<span>DZ</span>

</div>


<div class="secure">

🔒 دفع آمن ومشفر بواسطة PayDZ

</div>




<div class="product">


<div class="row">

<span>المنتج</span>

<strong>PayDZ Test Product</strong>

</div>



<div class="row">

<span>المبلغ</span>

</div>


<div class="price">

10,000 <span class="currency">DZD</span>

</div>



</div>




<div class="input">

<input placeholder="البريد الإلكتروني">

</div>



<div class="input">

<input placeholder="اسم العميل">

</div>




<button class="pay">

ادفع الآن

</button>




<div class="methods">

<div class="badge">
CIB
</div>


<div class="badge">
EDAHABIA
</div>


<div class="badge">
BaridiMob
</div>

</div>




<div class="footer">

© 2026 PayDZ Payments Platform

<br>

Enterprise Payment Infrastructure

</div>



</div>


</body>

</html>
